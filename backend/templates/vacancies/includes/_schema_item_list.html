<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "itemListElement": [
    {% for vacancy in vacancies %}
    {
      "@type": "ListItem",
      "position": {{ forloop.counter }},
      "url": "{{ request.scheme }}://{{ request.get_host }}{{ vacancy.get_absolute_url }}",
      "name": "{{ vacancy.seo_title|escapejs }}"
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
